version: "3.8"

# FlowSecure — SQLite-based, no external databases needed
# Usage: docker-compose up --build
# App → http://localhost:5173   API → http://localhost:8000

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/flowsecure.db:/app/flowsecure.db
    env_file:
      - ./backend/.env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    command: npm run dev -- --host 0.0.0.0 --port 5173
    depends_on:
      - backend
